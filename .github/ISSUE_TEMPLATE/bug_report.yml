name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's the issue? Be as detailed as possible.
      placeholder: "Describe the bug here..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "Expected behavior..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
      placeholder: "Actual behavior..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant system and version information
      placeholder: |
        - OS: (e.g., macOS 13.4)
        - Go version: (run `go version`)
        - Node version: (run `node --version`)
        - Browser: (if frontend issue)
      value: |
        - OS: 
        - Go version: 
        - Node version: 
        - Browser: 

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant error logs, stack traces, or screenshots
      placeholder: "Logs or screenshots..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've checked for existing issues
          required: true
        - label: I'm using the latest version
          required: true

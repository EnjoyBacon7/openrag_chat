name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
      placeholder: "Describe the feature..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? What problem does it solve?
      placeholder: "Explain the use case..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this could be implemented?
      placeholder: "Describe your proposed solution..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other approaches to solve this?
      placeholder: "List alternatives..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've checked for existing feature requests
          required: true
        - label: This feature aligns with the project scope
          required: true
